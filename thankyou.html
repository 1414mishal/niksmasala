<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Order Confirmed — Niks Masala</title>
<link rel="icon" href="nikslogomain.jpg">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div id="siteHeader"></div>

<div id="ty"></div>

<div id="siteFooter"></div>

<script src="assets/app.js"></script>
<script>
mountHeaderFooter('');
const order=JSON.parse(localStorage.getItem('niks_last_order')||'null');
if(!order){
  document.getElementById('ty').innerHTML=`<div style="text-align:center;padding:100px 20px"><h1 style="font-size:32px;margin-bottom:14px">No order found</h1><a href="shop.html" class="btn btn-primary">Shop Now</a></div>`;
}else{
  document.getElementById('ty').innerHTML=`
    <div style="max-width:780px;margin:60px auto;padding:40px 24px">
      <div style="background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden">
        <div style="background:linear-gradient(135deg,var(--red),var(--red-dark));color:#fff;padding:50px 30px;text-align:center">
          <div style="width:80px;height:80px;background:#fff;border-radius:50%;margin:0 auto 18px;display:grid;place-items:center;font-size:42px;color:var(--ok)">✓</div>
          <h1 style="color:#fff;font-size:34px;margin-bottom:10px">Thank you for your order!</h1>
          <p style="color:#f3ead6;font-size:16px">Your order has been placed successfully. We'll contact you shortly.</p>
        </div>
        <div style="padding:30px">
          <div style="background:var(--cream);padding:20px;border-radius:8px;margin-bottom:24px;display:grid;grid-template-columns:repeat(4,1fr);gap:20px;text-align:center">
            <div><div style="font-size:11px;color:var(--muted);letter-spacing:1px">ORDER NUMBER</div><strong style="color:var(--red);font-size:15px">${order.id}</strong></div>
            <div><div style="font-size:11px;color:var(--muted);letter-spacing:1px">DATE</div><strong style="font-size:15px">${new Date(order.date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</strong></div>
            <div><div style="font-size:11px;color:var(--muted);letter-spacing:1px">TOTAL</div><strong style="color:var(--red);font-size:15px">${money(order.total)}</strong></div>
            <div><div style="font-size:11px;color:var(--muted);letter-spacing:1px">PAYMENT</div><strong style="font-size:15px">${order.payment}</strong></div>
          </div>

          <h3 style="font-size:18px;margin-bottom:14px">Order Details</h3>
          <div style="border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:20px">
            ${order.items.map(i=>`
              <div style="display:flex;gap:14px;padding:14px;border-bottom:1px solid var(--line);align-items:center">
                <div style="width:60px;height:60px;border-radius:6px;overflow:hidden;background:var(--cream)"><img src="${i.image}" style="width:100%;height:100%;object-fit:cover"></div>
                <div style="flex:1"><strong>${i.name}</strong><br><small style="color:var(--muted)">Qty: ${i.qty} × ${money(i.price)}</small></div>
                <strong style="color:var(--red)">${money(i.price*i.qty)}</strong>
              </div>
            `).join('')}
            <div style="padding:14px;background:var(--cream)">
              <div style="display:flex;justify-content:space-between;padding:4px 0"><span>Subtotal</span><span>${money(order.subtotal)}</span></div>
              <div style="display:flex;justify-content:space-between;padding:4px 0"><span>Shipping</span><span>${order.shipping===0?'FREE':money(order.shipping)}</span></div>
              ${order.discount?`<div style="display:flex;justify-content:space-between;padding:4px 0;color:var(--ok)"><span>Discount</span><span>-${money(order.discount)}</span></div>`:''}
              <div style="display:flex;justify-content:space-between;padding:10px 0 0;margin-top:6px;border-top:1px solid var(--line);font-weight:700;font-size:17px;color:var(--red)"><span>Total</span><span>${money(order.total)}</span></div>
            </div>
          </div>

          <!-- Live Tracking Banner -->
          <div style="background:linear-gradient(135deg,#0f3d1e,#1b6b35);border-radius:10px;padding:22px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px">
            <div>
              <div style="color:rgba(255,255,255,.7);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px">Your Tracking ID</div>
              <div style="color:#fff;font-size:22px;font-weight:800;letter-spacing:1px">${order.id}</div>
              <div style="color:rgba(255,255,255,.65);font-size:12.5px;margin-top:4px">Save this to track your order anytime, anywhere</div>
            </div>
            <a href="track.html?id=${order.id}" style="background:#fff;color:var(--ink);font-weight:700;font-size:14px;padding:12px 22px;border-radius:8px;white-space:nowrap;display:inline-flex;align-items:center;gap:8px;transition:opacity .2s">
              🚚 Track My Order →
            </a>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px">
            <div style="background:var(--cream);padding:18px;border-radius:8px">
              <h4 style="font-size:13px;color:var(--muted);letter-spacing:1px;margin-bottom:10px">DELIVERY ADDRESS</h4>
              <strong>${order.customer.name}</strong><br>
              <span style="color:var(--text);font-size:14px">${order.customer.address}<br>${order.customer.city}, ${order.customer.state||''} ${order.customer.pincode}<br>📞 ${order.customer.phone}</span>
            </div>
            <div style="background:var(--cream);padding:18px;border-radius:8px">
              <h4 style="font-size:13px;color:var(--muted);letter-spacing:1px;margin-bottom:10px">WHAT'S NEXT?</h4>
              <p style="font-size:13.5px;color:var(--text)">✅ Order confirmed<br>📦 Packed & shipped within 24 hours<br>🚚 Delivery in 3–7 business days<br>🔍 <a href="track.html?id=${order.id}" style="color:var(--red);font-weight:600">Click here to track your order</a></p>
            </div>
          </div>

          <div style="text-align:center;padding-top:20px;border-top:1px solid var(--line)">
            <a href="track.html?id=${order.id}" class="btn btn-primary" style="margin-right:8px">🚚 Track Order</a>
            <a href="shop.html" class="btn btn-ghost">Continue Shopping</a>
          </div>
        </div>
      </div>
    </div>`;
}
</script>
</body>
</html>
